<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube ミニプレーヤーボタン - Sample</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      font-family: 'Segoe UI', Roboto, Arial, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .panel {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      width: 32px;
      height: 32px;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #ffffff;
    }

    .section {
      margin-bottom: 12px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .toggle-label {
      font-size: 13px;
      font-weight: 500;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 22px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #555;
      transition: 0.3s;
      border-radius: 22px;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background-color: #fff;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .slider {
      background-color: #ff0000;
    }

    input:checked + .slider::before {
      transform: translateX(18px);
    }

    .description {
      font-size: 11px;
      color: #999;
      line-height: 1.5;
      margin-top: 4px;
    }

    .status-section {
      text-align: center;
      padding-top: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 0;
    }

    .status {
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 12px;
      display: inline-block;
    }

    .status.enabled {
      background: rgba(76, 175, 80, 0.2);
      color: #4caf50;
    }

    .status.disabled {
      background: rgba(244, 67, 54, 0.2);
      color: #f44336;
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="header">
      <img src="icon48.png" alt="Logo" class="logo">
      <h1>YouTube ミニプレーヤー</h1>
    </div>
    <div class="section">
      <div class="toggle-row">
        <span class="toggle-label">ボタンを表示</span>
        <label class="switch">
          <input type="checkbox" id="enabled-toggle" checked>
          <span class="slider"></span>
        </label>
      </div>
      <p class="description">YouTubeプレーヤーのコントロールバーにミニプレーヤーボタンを表示します。</p>
    </div>
    <div class="section status-section">
      <span id="status-text" class="status enabled">有効</span>
    </div>
  </div>
  <script>
    (function () {
      'use strict';

      var toggle = document.getElementById('enabled-toggle');
      var statusText = document.getElementById('status-text');

      toggle.addEventListener('change', function () {
        if (toggle.checked) {
          statusText.textContent = '有効';
          statusText.className = 'status enabled';
        } else {
          statusText.textContent = '無効';
          statusText.className = 'status disabled';
        }
      });
    })();
  </script>
</body>
</html>
